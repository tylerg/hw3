# §5 — VLM training on CLEVR.

decoder:
  model_name: HuggingFaceTB/SmolLM2-360M-Instruct
  torch_dtype: bfloat16
  attn_implementation: sdpa

projector:
  expansion: 4

optim:
  lr: 1.0e-4
  weight_decay: 0.0
  betas: [0.9, 0.95]
  warmup_steps: 50
  scheduler: cosine

train:
  num_steps: 2
  batch_size: 2
  gradient_accumulation_steps: 1
  num_workers: 4
  log_every: 1
  eval_every_steps: 1
  eval_max_examples: 2

generation:
  max_new_tokens: 32
  do_sample: false
  temperature: 1.0
  top_p: 1.0

vit:
  img_size: 224
  patch_size: 16
  d_model: 768
  num_heads: 6
  num_blocks: 6
  dropout: 0.1