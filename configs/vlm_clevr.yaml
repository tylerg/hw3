# §5 — VLM training on CLEVR.

decoder:
  model_name: HuggingFaceTB/SmolLM2-360M-Instruct
  torch_dtype: bfloat16
  attn_implementation: sdpa

projector:
  expansion: 4

optim:
  lr: 1.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.95]
  warmup_steps: 100
  scheduler: cosine

train:
  num_steps: 500
  batch_size: 32
  gradient_accumulation_steps: 1
  num_workers: 4

  log_every: 50
  eval_every_steps: 250

  eval_max_examples: 500
  max_length: 128

generation:
  max_new_tokens: 8
  do_sample: false
  temperature: 1.0
  top_p: 1.0
  max_prompt_length: 128

vit:
  img_size: 64
  patch_size: 8
  d_model: 384
  num_heads: 6
  num_blocks: 6
  dropout: 0.1